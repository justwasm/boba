# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# .goreleaser.yml
# CGO-free release builds for boba CLI utilities.

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: boba-wasm-build
    main: ./cmd/boba-wasm-build
    binary: boba-wasm-build
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
